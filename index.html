<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常消费登记簿</title>
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="消费记录">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            max-width: 700px;
            margin: 20px auto;
            padding: 0 15px;
            background: #f5f7fa;
            color: #222;
            transition: background 0.3s, color 0.3s;
        }
        body.dark {
            background: #1a1a1a;
            color: #eee;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .select-date-box {
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            transition: background 0.3s;
        }
        body.dark .select-date-box {
            background: #2d2d2d;
        }
        .form-box {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        body.dark .form-box {
            background: #2d2d2d;
        }
        .line-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        input, select, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            background: #fff;
            color: #222;
            transition: all 0.3s;
        }
        body.dark input, body.dark select, body.dark button:not(.del):not(.close-modal) {
            background: #444;
            color: #eee;
            border-color: #555;
        }
        #goodsInput {
            width: 100%;
        }
        #amountInput {
            width: 100%;
        }
        select {
            flex: 1;
        }
        button#addBtn {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        #settingBtn {
            background: #28a745;
            color: #fff;
            border: none;
        }
        button.del {
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 4px 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .tip {
            margin-top:8px;color:#666;font-size:13px;
        }
        body.dark .tip {
            color:#aaa;
        }
        .list-title {
            font-size: 17px;
            margin: 10px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            transition: background 0.3s;
        }
        body.dark table {
            background: #2d2d2d;
        }
        th, td {
            border: 1px solid #eee;
            padding: 10px 6px;
            font-size: 14px;
            text-align: center;
        }
        body.dark th, body.dark td {
            border-color:#444;
        }
        th {
            background: #e9f3ff;
        }
        body.dark th {
            background:#334155;
        }
        .total-row td {
            font-weight:bold;
            background:#e9f3ff;
            font-size:1.5em;
        }
        body.dark .total-row td {
            background:#334155;
        }
        /* 设置弹窗样式 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .modal-box {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            transition: background 0.3s;
        }
        body.dark .modal-box {
            background:#2d2d2d;
        }
        .modal-box h3 {
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            gap:12px;
            margin-bottom:20px;
        }
        .modal-buttons button {
            flex:1;
        }
        .setting-extra {
            margin:15px 0;
            padding-top:15px;
            border-top:1px solid #eee;
        }
        body.dark .setting-extra {
            border-color:#444;
        }
        .content-block {
            display: none;
            padding:10px 0;
            border-top:1px solid #eee;
        }
        body.dark .content-block {
            border-color:#444;
        }
        .content-block.show {
            display:block;
        }
        .summary-item {
            padding: 8px 0;
            font-size: 16px;
        }
        .close-modal {
            width: 100%;
            margin-top:15px;
            background:#666;
            color:white;
            border:none;
        }

        .flag-icon { width:20px; height:13px; vertical-align:middle; border-radius:2px; }
        .custom-select { flex:1; position:relative; }
        .select-trigger {
            display: flex; align-items: center; gap: 6px;
            padding: 10px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 15px; cursor: pointer; background: #fff;
            user-select: none; transition: all 0.3s;
        }
        .select-trigger .arrow { margin-left: auto; font-size: 10px; }
        .select-options {
            display: none;
            position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
            background: #fff; border: 1px solid #ddd; border-radius: 6px;
            margin-top: 2px; overflow: hidden;
        }
        .select-options.open { display: block; }
        .select-option {
            display: flex; align-items: center; gap: 6px;
            padding: 10px; cursor: pointer; transition: background 0.2s;
        }
        .select-option:hover { background: #f0f0f0; }
        body.dark .select-trigger {
            background: #444; color: #eee; border-color: #555;
        }
        body.dark .select-options {
            background: #444; border-color: #555;
        }
        body.dark .select-option:hover { background: #555; }
        /* 切换开关样式 */
        .toggle-switch-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
            cursor: pointer;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc;
            border-radius: 26px;
            transition: 0.3s;
        }
        .toggle-slider::before {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            left: 2px;
            bottom: 2px;
            background: #fff;
            border-radius: 50%;
            transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider {
            background: #007bff;
        }
        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(24px);
        }
        body.dark .toggle-slider {
            background: #555;
        }
        body.dark .toggle-switch input:checked + .toggle-slider {
            background: #4a9eff;
        }
    </style>
</head>
<body>
    <!-- 日期选择栏 + 右侧设置按钮 -->
    <div class="select-date-box">
        <div>
            <label>选择查看日期：</label>
            <input type="date" id="dayPicker">
        </div>
        <button id="settingBtn">设置</button>
    </div>

    <!-- 新增账单表单 -->
    <div class="form-box">
        <!-- 第一行：消费分类 + 币种 -->
        <div class="line-row">
            <select id="typeSelect">
                <option value="餐饮">餐饮</option>
                <option value="娱乐消费">娱乐消费</option>
            </select>
            <div class="custom-select" id="currencySelectWrap">
                <div class="select-trigger">
                    <img class="flag-icon" src="Macau.png"> 葡币
                    <span class="arrow">▼</span>
                </div>
                <div class="select-options">
                    <div class="select-option" data-value="葡币">
                        <img class="flag-icon" src="Macau.png"> 葡币
                    </div>
                    <div class="select-option" data-value="人民币">
                        <img class="flag-icon" src="china.png"> 人民币
                    </div>
                    <div class="select-option" data-value="港币">
                        <img class="flag-icon" src="HK.png"> 港币
                    </div>
                </div>
            </div>
        </div>
        <!-- 第二行：消费内容输入 -->
        <div class="line-row">
            <input type="text" id="goodsInput" placeholder="消费内容（叉烧饭/烧烤/炸嘢等）" required>
        </div>
        <!-- 第三行：金额输入 -->
        <div class="line-row">
            <input type="number" id="amountInput" placeholder="金额" min="0" step="0.01" required>
        </div>

        <button id="addBtn">新增这条消费记录</button>
    </div>

    <!-- 当日账单列表 -->
    <div>
        <table id="dailyTotalTable" style="margin-bottom:10px;">
            <thead>
                <tr>
                    <th>币种</th>
                    <th>金额</th>
                </tr>
            </thead>
            <tbody id="dailyTotalBody"></tbody>
        </table>
        <div class="list-title">当日消费清单</div>
        <table>
            <colgroup>
                <col style="width:10%">
                <col style="width:35%">
                <col style="width:13%">
                <col style="width:12%">
                <col style="width:15%">
                <col style="width:15%">
            </colgroup>
            <thead>
                <tr>
                    <th>消费分类</th>
                    <th>消费项目</th>
                    <th>币种</th>
                    <th>金额</th>
                    <th>时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="billList"></tbody>
        </table>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-mask" id="modalMask">
        <div class="modal-box">
            <h3>设置版面</h3>
            <div class="modal-buttons">
                <button id="btnMonthSummary">月度总结</button>
            </div>
            <!-- 深浅模式开关 -->
            <div class="setting-extra">
                <div class="toggle-switch-wrap">
                    <span>深色模式</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggleDarkInput">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            <!-- 月度总结区域 -->
            <div id="summaryBlock" class="content-block">
                <h4 id="summaryTitle"></h4>
                <div id="summaryContent"></div>
            </div>
            <button class="close-modal" id="closeModalBtn">关闭</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = "consumeBills";
        const DARK_KEY = "darkMode";
        const dayPicker = document.getElementById("dayPicker");
        const typeSelect = document.getElementById("typeSelect");
        const goodsInput = document.getElementById("goodsInput");
        const amountInput = document.getElementById("amountInput");
        const addBtn = document.getElementById("addBtn");
        const billList = document.getElementById("billList");
        const settingBtn = document.getElementById("settingBtn");
        const modalMask = document.getElementById("modalMask");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const btnMonthSummary = document.getElementById("btnMonthSummary");
        const toggleDarkInput = document.getElementById("toggleDarkInput");
        const summaryBlock = document.getElementById("summaryBlock");
        const summaryTitle = document.getElementById("summaryTitle");
        const summaryContent = document.getElementById("summaryContent");

        // 自訂幣種下拉選單
        const selectWrap = document.getElementById('currencySelectWrap');
        const selectTrigger = selectWrap.querySelector('.select-trigger');
        const selectOptions = selectWrap.querySelector('.select-options');
        const allCurrencyOptions = selectWrap.querySelectorAll('.select-option');
        let selectedCurrency = '葡币';
        selectTrigger.onclick = (e) => {
            e.stopPropagation();
            selectOptions.classList.toggle('open');
        };
        allCurrencyOptions.forEach(opt => {
            opt.onclick = () => {
                const val = opt.dataset.value;
                selectedCurrency = val;
                const imgSrc = opt.querySelector('img').src;
                selectTrigger.innerHTML = `<img class="flag-icon" src="${imgSrc}"> ${val} <span class="arrow">▼</span>`;
                selectOptions.classList.remove('open');
            };
        });
        document.addEventListener('click', () => { selectOptions.classList.remove('open'); });
        // 深浅模式初始化
        function initDarkMode(){
            const isDark = localStorage.getItem(DARK_KEY) === "1";
            if(isDark) {
                document.body.classList.add("dark");
                toggleDarkInput.checked = true;
            }
        }
        toggleDarkInput.onchange = ()=>{
            const nowDark = toggleDarkInput.checked;
            document.body.classList.toggle("dark", nowDark);
            localStorage.setItem(DARK_KEY, nowDark ? "1" : "0");
        }
        initDarkMode();

        // 获取今日日期 YYYY-MM-DD
        function getTodayStr() {
            const d = new Date();
            let m = d.getMonth() + 1;
            let day = d.getDate();
            return `${d.getFullYear()}-${String(m).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        }

        // 获取当前时分 HH:mm
        function getNowTime() {
            const d = new Date();
            let h = String(d.getHours()).padStart(2, "0");
            let mi = String(d.getMinutes()).padStart(2, "0");
            return `${h}:${mi}`;
        }

        dayPicker.value = getTodayStr();

        // 读取本地账单
        function getAllBills() {
            const str = localStorage.getItem(STORAGE_KEY);
            return str ? JSON.parse(str) : [];
        }

        // 保存账单
        function saveBills(list) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        }

        // 渲染当日账单
        function renderBills() {
            const all = getAllBills();
            const targetDay = dayPicker.value;
            const dayBills = all.filter(item => item.date === targetDay);
            billList.innerHTML = "";

            // 计算当日消费总额（表格显示，所有币种均显示）
            const currencies = ["葡币", "人民币", "港币"];
            const currencyFlagImg = {
                "葡币": `<img class="flag-icon" src="Macau.png">`,
                "人民币": `<img class="flag-icon" src="china.png">`,
                "港币": `<img class="flag-icon" src="HK.png">`
            };
            const totalByCurrency = {};
            currencies.forEach(c => totalByCurrency[c] = 0);
            let grandTotal = 0;
            dayBills.forEach(b => {
                const num = Number(b.amount);
                grandTotal += num;
                totalByCurrency[b.currency] += num;
            });
            const dailyTotalBody = document.getElementById("dailyTotalBody");
            let html = "";
            for (let c of currencies) {
                html += `<tr><td>${c} ${currencyFlagImg[c] || ''}</td><td>${totalByCurrency[c].toFixed(1)}</td></tr>`;
            }
            html += `<tr class="total-row"><td>总计</td><td>${grandTotal.toFixed(1)}</td></tr>`;
            dailyTotalBody.innerHTML = html;

            dayBills.forEach((item) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${item.type}</td>
                    <td>${item.goods}</td>
                    <td>${item.currency}</td>
                    <td>${item.amount}</td>
                    <td>${item.time}</td>
                    <td><button class="del" data-index="${all.indexOf(item)}">删除</button></td>
                `;
                billList.appendChild(tr);
            })

            document.querySelectorAll(".del").forEach(btn => {
                btn.onclick = function() {
                    if (!confirm("确定要删除这条记录吗？")) return;
                    const delIdx = Number(this.dataset.index);
                    const all = getAllBills();
                    all.splice(delIdx, 1);
                    saveBills(all);
                    renderBills();
                }
            })
        }

        // 新增记录
        addBtn.onclick = function() {
            const date = dayPicker.value;
            const time = getNowTime();
            const type = typeSelect.value;
            const goods = goodsInput.value.trim();
            const currency = selectedCurrency;
            const amount = Number(amountInput.value);

            if (!date || !goods || isNaN(amount) || amount < 0) {
                alert("请填写消费内容同有效金额！");
                return;
            }

            const newBill = { date, time, type, goods, currency, amount };
            const all = getAllBills();
            all.push(newBill);
            saveBills(all);

            goodsInput.value = "";
            amountInput.value = "";
            renderBills();
        }

        // 切换日期刷新列表
        dayPicker.onchange = renderBills;

        // 关闭弹窗
        closeModalBtn.onclick = () => {
            modalMask.style.display = "none";
            summaryBlock.classList.remove("show");
        };

        // 打开设置主弹窗
        settingBtn.onclick = function() {
            modalMask.style.display = "flex";
            summaryBlock.classList.remove("show");
        }

        // 月度总结按钮，计算当月数据
        btnMonthSummary.onclick = function(){
            summaryBlock.classList.add("show");

            const selectedDate = dayPicker.value;
            const year = selectedDate.split("-")[0];
            const month = selectedDate.split("-")[1];
            summaryTitle.innerText = `${year}年${month}月 消费总结`;

            const allBills = getAllBills();
            const monthBills = allBills.filter(bill => {
                const bYear = bill.date.split("-")[0];
                const bMonth = bill.date.split("-")[1];
                return bYear === year && bMonth === month;
            });

            const currencyTotal = {};
            const typeTotal = {};
            let totalCount = monthBills.length;

            monthBills.forEach(b => {
                const num = Number(b.amount);
                if (!currencyTotal[b.currency]) currencyTotal[b.currency] = 0;
                currencyTotal[b.currency] += num;
                if (!typeTotal[b.type]) typeTotal[b.type] = 0;
                typeTotal[b.type] += num;
            });

            let html = `<div class="summary-item">当月总消费笔数：${totalCount}笔</div>`;
            
            html += `<div class="summary-item"><strong>各币种总额：</strong><br>`;
            for(let c in currencyTotal){
                html += `${c} ${currencyFlagImg[c] || ''}：${currencyTotal[c].toFixed(1)}<br>`;
            }
            html += `</div>`;

            html += `<div class="summary-item"><strong>分类总额：</strong><br>`;
            for(let t in typeTotal){
                html += `${t}：${typeTotal[t].toFixed(1)}<br>`;
            }
            html += `</div>`;

            if(totalCount === 0){
                html = `<div class="summary-item">本月暂无任何消费记录</div>`;
            }
            summaryContent.innerHTML = html;
        }

        // 注册 Service Worker（PWA 安装必需）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        // 页面初始化渲染
        renderBills();
    </script>
</body>
</html>
